spring.application.name=etl-runner-worker
spring.profiles.active=batch

#Server Configuration
server.port=8081
server.servlet.context-path=/etlrunnerbatch/v1

#Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ETLRunner
spring.datasource.username=postgres
spring.datasource.password=kemal1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Konfigürasyonu
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true