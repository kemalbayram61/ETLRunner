spring.application.name=etl-runner-api
spring.profiles.active=business

#Server Configuration
server.port=8080
server.servlet.context-path=/etlrunnerbus/v1

#Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ETLRunner
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

#JWT Configuration
jwt.secret=3yJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
jwt.expiration=86400000